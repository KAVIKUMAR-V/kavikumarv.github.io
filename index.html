<!DOCTYPE html>
<html>
<head>
    <title>My Profile</title>

    <style>
        body {
            background-color: lightyellow;
            text-align: center;
            font-family: Arial;
        }

        h1 {
            color: darkgreen;
        }

        button {
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            font-size: 16px;
            border-radius: 5px;
            margin: 10px;
        }

        button:hover {
            background-color: darkblue;
        }
    </style>

</head>
<body>

    <h1>Kavikumar V</h1>
    <h2>Department: EEE ⚡</h2>

    <!-- Message button -->
    <button onclick="showMessage()">Click Me</button>

    <!-- Music button -->
    <button onclick="playSong()">Play Music 🎵</button>

    <!-- Audio file -->
    <audio id="mysong">
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <script>
        function showMessage() {
            alert("Welcome to my website 😎");
        }

        function playSong() {
            document.getElementById("mysong").play();
        }
    </script>

</body>
</html>
